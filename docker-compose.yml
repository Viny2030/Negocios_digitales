version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://prescriptive:prescriptive@db:5432/prescriptive
      - DATASETS_DIR=/app/storage/datasets
      - MODELS_DIR=/app/storage/models
    volumes:
      - ./storage:/app/storage
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=prescriptive
      - POSTGRES_PASSWORD=prescriptive
      - POSTGRES_DB=prescriptive
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
